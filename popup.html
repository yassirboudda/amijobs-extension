<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>AmiJobs</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 380px;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: #1e293b;
    }
    .header {
      padding: 14px 16px;
      background: linear-gradient(120deg, #4f46e5 0%, #7c3aed 55%, #db2777 100%);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 28px; height: 28px; border-radius: 6px; }
    .title { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .sub { font-size: 10px; opacity: 0.85; margin-top: 2px; }
    .v { font-size: 10px; opacity: 0.8; text-align: right; }
    .block {
      margin: 10px;
      padding: 12px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(79, 70, 229, 0.08);
      border: 1px solid #e2e8f0;
    }
    .block h3 {
      margin: 0 0 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #64748b;
      font-weight: 700;
    }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    input, select, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
    }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .btn-main {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
    }
    .btn-stop { background: #dc2626; color: white; }
    .btn-muted { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
    .btn-resume { background: #0d9488; color: white; }
    .platforms {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .platform {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      background: #fafafa;
    }
    .platform.disabled { opacity: 0.45; }
    .platform input { width: auto; accent-color: #4f46e5; }
    .platform .soon { font-size: 9px; color: #94a3b8; font-weight: 500; display: block; }
    .status {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f1f5f9;
      font-weight: 600;
    }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px; }
    .card { background: #f8fafc; border-radius: 8px; text-align: center; padding: 8px 4px; }
    .num { font-size: 20px; font-weight: 800; color: #4f46e5; }
    .lab { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; }
    #log {
      height: 140px;
      overflow: auto;
      background: #0f172a;
      color: #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .footer {
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
      padding: 4px 0 10px;
    }
    .footer a { color: #6366f1; text-decoration: none; font-weight: 600; }
    textarea.locations {
      min-height: 52px;
      resize: vertical;
      font-size: 12px;
    }
    .contracts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      background: #fafafa;
      cursor: pointer;
    }
    .chip input { width: auto; accent-color: #4f46e5; margin: 0; }
    .field-label {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <img src="icons/icon48.png" alt="AmiJobs" />
      <div>
        <div class="title" data-i18n="extName">AmiJobs</div>
        <div class="sub" data-i18n="tagline">Candidatures automatiques multi-plateformes</div>
      </div>
    </div>
    <div class="v">v1.2.3</div>
  </div>

  <div class="block">
    <h3 data-i18n="platforms">Plateformes</h3>
    <div class="platforms">
      <label class="platform">
        <input type="checkbox" id="platformHellowork" checked />
        <span><span data-i18n="platformHellowork">Hellowork</span></span>
      </label>
      <label class="platform">
        <input type="checkbox" id="platformLinkedin" checked />
        <span><span data-i18n="platformLinkedin">LinkedIn</span></span>
      </label>
      <label class="platform">
        <input type="checkbox" id="platformIndeed" />
        <span><span data-i18n="platformIndeed">Indeed</span></span>
      </label>
      <label class="platform">
        <input type="checkbox" id="platformGlassdoor" />
        <span><span data-i18n="platformGlassdoor">Glassdoor</span></span>
      </label>
    </div>
  </div>

  <div class="block">
    <div class="row">
      <input id="keywords" data-i18n-ph="keywordsPh" placeholder="Ex: Développeur Python…" />
    </div>
    <div style="height:8px"></div>
    <div class="row">
      <div style="flex:1">
        <div class="field-label" data-i18n="location">Localisation(s)</div>
        <textarea id="locations" class="locations" data-i18n-ph="locationsPh" placeholder="Paris&#10;Lyon&#10;Marseille"></textarea>
      </div>
    </div>
    <div style="height:8px"></div>
    <div>
      <div class="field-label" data-i18n="contract">Types de contrat</div>
      <div class="contracts">
        <label class="chip"><input type="checkbox" id="contractCDI" value="CDI" /> <span data-i18n="ctCDI">CDI</span></label>
        <label class="chip"><input type="checkbox" id="contractCDD" value="CDD" /> <span data-i18n="ctCDD">CDD</span></label>
        <label class="chip"><input type="checkbox" id="contractAlternance" value="Alternance" /> <span data-i18n="ctAlternance">Alternance</span></label>
        <label class="chip"><input type="checkbox" id="contractStage" value="Stage" /> <span data-i18n="ctStage">Stage</span></label>
        <label class="chip"><input type="checkbox" id="contractFreelance" value="Freelance" /> <span data-i18n="ctFreelance">Freelance</span></label>
      </div>
    </div>
    <div style="height:8px"></div>
    <div class="row">
      <input id="maxJobs" type="number" min="1" max="100" value="25" />
      <button class="btn-main" id="startBtn" data-i18n="startSession">Lancer la session</button>
    </div>
    <div style="height:8px"></div>
    <div class="row">
      <button class="btn-stop" id="stopBtn" disabled data-i18n="stopSession">Arrêter</button>
      <button class="btn-resume" id="resumeBtn" disabled data-i18n="resumeSession">Reprendre</button>
    </div>
    <div style="height:8px"></div>
    <div class="row">
      <button class="btn-muted" id="singleBtn" data-i18n="applyHere">Postuler ici</button>
      <button class="btn-muted" id="optionsBtn" data-i18n="options">Configuration</button>
    </div>
  </div>

  <div class="block">
    <div id="status" class="status" data-i18n="statusInactive">Inactif</div>
    <div class="stats">
      <div class="card"><div id="applied" class="num">0</div><div class="lab" data-i18n="applied">Postulées</div></div>
      <div class="card"><div id="skipped" class="num">0</div><div class="lab" data-i18n="skipped">Ignorées</div></div>
      <div class="card"><div id="errors" class="num">0</div><div class="lab" data-i18n="errors">Erreurs</div></div>
    </div>
  </div>

  <div class="block">
    <div class="row" style="margin-bottom:8px;">
      <button class="btn-muted" id="downloadLog" data-i18n="downloadLog">Télécharger log</button>
      <button class="btn-muted" id="clearLog" data-i18n="clearLog">Effacer log</button>
      <button class="btn-muted" id="resetStats" data-i18n="resetStats">Reset</button>
    </div>
    <div id="log" data-i18n="loading">Chargement…</div>
  </div>

  <div class="footer">
    <a href="https://amijobs.com" target="_blank" rel="noopener">amijobs.com</a> · Mistral AI
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
